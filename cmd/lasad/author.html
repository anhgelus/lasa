<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Author }}'s publications - Lasa</title>
    <style>
        :root {
            font-size: 18px;
        }
        body {
            margin: 0;
            padding-bottom: 4rem;
            font-family: system-ui, Inter, sans-serif;
            line-height: 1.6em;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        body > * {
            display: block;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
        }
        h1, h2, h3 { 
            line-height: 1.6em; 
            margin-top: 2rem;
        }
        h1 { 
            text-align: center; 
        }
        code {
            font-family: monospace;
            font-size: 0.9em;
            letter-spacing: -0.2px;
        }
        a {
            color: #023e8a;
            padding: 0.1em;
        }
        a:hover {
            background: #023e8a;
            color: white;
        }

        @media only screen and (prefers-color-scheme: dark) {
            :root {
                color: #f0ebd8;
                background-color: #0d1321;
            }
            a {
                color: #90e0ef;
            }
            a:hover {
                background: #90e0ef;
                color: black;
            }
        }
    </style>
</head>
<body>
    <h1>{{ .Author }}'s publications</h1>
    <h3>RSS</h3>
    <ul>
        {{- range .Publications }}<li><a href="{{ .Link }}/rss">{{ .Name }}</a></li>{{ end -}}
    </ul>
    <h3>Atom</h3>
    <ul>
        {{- range .Publications }}<li><a href="{{ .Link }}/atom">{{ .Name }}</a></li>{{ end -}}
    </ul>
</body>
</html>
