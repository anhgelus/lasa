<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/style.css" rel="stylesheet">
    <title>{{ .Author }}'s publications - Lasa</title>
</head>
<body>
    <h1>{{ .Author }}'s publications</h1>
    <main>
        {{- range .Publications }}
            <div>
                <h3>{{ .Name }}</h3>
                <div class="publications">
                    <a href="{{ .URL }}" target="_blank">Read</a>
                    <a href="{{ .Link }}/rss">RSS</a>
                    <a href="{{ .Link }}/atom">Atom</a>
                </div>
            </div>
        {{ end -}}
    </main>
    <footer>
        <a href="https://tangled.org/anhgelus.world/lasa/" target="_blank">Source code</a>
        {{ if isSet .LegalNotice }}
            <a href="{{ .LegalNotice }}">Legal notice</a>
        {{ end }}
    </footer>
</body>
</html>
